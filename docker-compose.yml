services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: snowflake_loader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/snowflake_loader
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /data/uploads
      CELERY_TASK_ALWAYS_EAGER: "true"
    ports:
      - "8000:8000"
    volumes:
      - uploads:/data/uploads
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/snowflake_loader
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  uploads:
